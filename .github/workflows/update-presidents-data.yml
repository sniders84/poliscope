name: Update Presidents Data

on:
  workflow_dispatch:
  push:
    paths:
      - "public/presidents-*.json"
      - "scripts/bootstrap-presidents.js"
      - "scripts/presidents-scores.js"
      - "scripts/presidential-eras.js"

jobs:
  update-presidents-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for proper rebase

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Bootstrap presidents-rankings.json
        run: node scripts/bootstrap-presidents.js

      - name: Score presidents and update rankings
        run: node scripts/presidents-scores.js

      - name: Commit updated presidents-rankings.json
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/presidents-rankings.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update presidents-rankings.json via workflow [skip ci]"

          # Safer rebase + push instead of stash/pop
          git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
          git push --force-with-lease origin HEAD:main || { echo "Push failed - possible conflict"; exit 1; }
