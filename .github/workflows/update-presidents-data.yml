name: Update Presidents Data

on:
  workflow_dispatch:
  push:
    paths:
      - "public/presidents-*.json"
      - "public/presidents.json"
      - "scripts/bootstrap-presidents.js"
      - "scripts/merge-timeline.js"
      - "scripts/presidents-scores.js"
      - "scripts/presidential-eras.js"

jobs:
  update-presidents-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      # 1. Bootstrap skeleton rankings
      - name: Bootstrap presidents-rankings.json
        run: node scripts/bootstrap-presidents.js

      # 2. Merge all metric files into presidents-full-timeline.json
      - name: Merge metric files into presidents-full-timeline.json
        run: node scripts/merge-timeline.js

      # 3. Score presidents
      - name: Score presidents and update rankings
        run: node scripts/presidents-scores.js

      # 4. Commit & push updated files
      - name: Commit and push updated presidents files
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage only the files we care about
          git add public/presidents-rankings.json public/presidents-full-timeline.json
          # Exit cleanly if no changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update presidents data via workflow [skip ci]"
          git push origin HEAD:main || {
            echo "Push failed - possible conflict. Fetching latest..."
            git fetch origin main
            git reset --hard origin/main
            echo "Re-running scripts after reset..."
            node scripts/bootstrap-presidents.js
            node scripts/merge-timeline.js
            node scripts/presidents-scores.js
            git add public/presidents-rankings.json public/presidents-full-timeline.json
            git commit -m "Retry update presidents data [skip ci]" || echo "No retry changes"
            git push origin HEAD:main
          }
