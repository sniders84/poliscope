name: Update Presidents Data

on:
  workflow_dispatch:
  push:
    paths:
      - "public/presidents-*.json"
      - "scripts/bootstrap-presidents.js"
      - "scripts/presidents-scores.js"
      - "scripts/presidential-eras.js"

jobs:
  update-presidents-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Bootstrap presidents-rankings.json
        run: node scripts/bootstrap-presidents.js

      - name: Score presidents and update rankings
        run: node scripts/presidents-scores.js

      - name: Commit and push updated presidents files
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 🔒 Stage ONLY president files (full isolation)
          git add -- public/presidents-*.json public/presidents.json

          # If nothing changed, exit cleanly
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update presidents data via workflow [skip ci]"

          # Push with lease safety
          git push --force-with-lease origin HEAD:main || {
            echo "Push failed - possible conflict. Fetching latest..."
            git fetch origin main
            git reset --hard origin/main

            echo "Re-running scripts after reset..."
            node scripts/bootstrap-presidents.js
            node scripts/presidents-scores.js

            git add -- public/presidents-*.json public/presidents.json
            git commit -m "Retry update presidents data [skip ci]" || echo "No retry changes"
            git push origin HEAD:main
          }
