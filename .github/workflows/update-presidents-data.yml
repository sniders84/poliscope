name: Update Presidents Data

on:
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - "public/presidents.json"              # Source of truth for basic info + photos
      - "public/presidents-rankings.json"     # Generated output
      - "scripts/bootstrap-presidents.js"
      - "scripts/merge-presidents.js"         # Now critical — populates events
      - "scripts/presidents-scores.js"
      - "scripts/presidential-eras.js"

jobs:
  update-presidents-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for proper git history in retry

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm ci
          fi

      # ────────────────────────────────────────────────────────────────
      # 1. Bootstrap → creates clean skeleton with empty events[]
      #    (photos + basic info preserved from presidents.json)
      # ────────────────────────────────────────────────────────────────
      - name: Bootstrap clean presidents-rankings.json skeleton
        run: node scripts/bootstrap-presidents.js

      # ────────────────────────────────────────────────────────────────
      # 2. Merge / Populate → adds real events, tags, sources, initial scores
      #    IMPORTANT: This step MUST preserve the 'photo' field from presidents.json
      # ────────────────────────────────────────────────────────────────
      - name: Merge timelines, events, and photos into rankings
        run: node scripts/merge-presidents.js

      # ────────────────────────────────────────────────────────────────
      # 3. Score → reads events[], computes categoryScores, overallPowerScore, era rankings
      # ────────────────────────────────────────────────────────────────
      - name: Score presidents (events-based) and generate rankings
        run: node scripts/presidents-scores.js

      # ────────────────────────────────────────────────────────────────
      # 4. Commit & Push (only if changes exist, safe retry on conflict)
      # ────────────────────────────────────────────────────────────────
      - name: Commit and push updated presidents files
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the president-related JSON files
          git add public/presidents.json public/presidents-rankings.json

          # Nothing to commit? Exit cleanly
          if git diff --cached --quiet; then
            echo "No changes detected — skipping commit."
            exit 0
          fi

          git commit -m "chore: update presidents data & scores [skip ci]"

          # Safe push with lease; retry logic if conflict
          git push --force-with-lease origin HEAD:main || {
            echo "Push failed (likely conflict) — resetting and retrying..."
            git fetch origin main
            git reset --hard origin/main

            echo "Re-running pipeline after reset..."
            node scripts/bootstrap-presidents.js
            node scripts/merge-presidents.js
            node scripts/presidents-scores.js

            git add public/presidents.json public/presidents-rankings.json
            git commit -m "chore: retry update presidents data after conflict [skip ci]" || echo "No changes on retry"
            git push origin HEAD:main
          }

      - name: Workflow summary
        run: |
          echo "Workflow complete."
          echo "Photos preserved from public/presidents.json → merged into rankings."
          echo "Check public/presidents-rankings.json for photo fields and event data."
