name: Update Presidents Data

on:
  workflow_dispatch:
  push:
    paths:
      - "public/presidents.json"
      - "data/presidents-*.json"
      - "scripts/bootstrap-presidents.js"
      - "scripts/merge-presidents.js"
      - "scripts/presidents-scores.js"
      - "scripts/presidential-eras.js"

jobs:
  update-presidents-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Bootstrap presidents-rankings.json
        run: node scripts/bootstrap-presidents.js

      - name: Merge metric files into presidents-rankings.json
        run: node scripts/merge-presidents.js

      - name: Score presidents and update rankings
        run: node scripts/presidents-scores.js

      - name: Commit updated presidents-rankings.json
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/presidents-rankings.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update presidents-rankings.json via workflow"
            git push
          fi
