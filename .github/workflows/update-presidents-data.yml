name: Update Presidents Data

on:
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - "public/presidents.json"              # Source for basics + photos
      - "public/presidents-rankings.json"     # Generated output
      - "scripts/bootstrap-presidents.js"
      - "scripts/merge-presidents.js"
      - "scripts/presidents-scores.js"
      - "scripts/presidential-eras.js"

jobs:
  update-presidents-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # NO NPM INSTALL STEP — your scripts use only built-in Node modules

      # 1. Bootstrap → creates clean skeleton with empty events[]
      - name: Bootstrap clean presidents-rankings.json skeleton
        run: node scripts/bootstrap-presidents.js

      # 2. Merge / Populate → adds real events, tags, sources; preserves photos
      - name: Merge timelines, events, and photos into rankings
        run: node scripts/merge-presidents.js

      # 3. Score → computes from events[], generates rankings
      - name: Score presidents (events-based) and generate rankings
        run: node scripts/presidents-scores.js

      # 4. Commit & Push (only if changes exist, with safe retry)
      - name: Commit and push updated presidents files
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only relevant files
          git add public/presidents.json public/presidents-rankings.json

          # Nothing to commit? Exit cleanly
          if git diff --cached --quiet; then
            echo "No changes detected — skipping commit."
            exit 0
          fi

          git commit -m "chore: update presidents data & scores [skip ci]"

          # Safe push with lease; retry on conflict
          git push --force-with-lease origin HEAD:main || {
            echo "Push failed (likely conflict) — resetting and retrying..."
            git fetch origin main
            git reset --hard origin/main

            echo "Re-running pipeline after reset..."
            node scripts/bootstrap-presidents.js
            node scripts/merge-presidents.js
            node scripts/presidents-scores.js

            git add public/presidents.json public/presidents-rankings.json
            git commit -m "chore: retry update presidents data after conflict [skip ci]" || echo "No changes on retry"
            git push origin HEAD:main
          }

      - name: Workflow summary
        run: |
          echo "Workflow complete."
          echo "Photos preserved from public/presidents.json → merged into rankings."
          echo "Check public/presidents-rankings.json for photo fields and events."
