name: Debug House - Fast (skip legislation)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fast-house:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for git-auto-commit to work properly

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install jsdom --save
          npm install xmldom --save

      # ────────────────────────────────────────────────────────────────
      # Optional: If you sometimes need the latest merged legislation,
      # uncomment these 3 steps to download & merge the parts.
      # Otherwise leave commented to save ~2 hours.
      # ────────────────────────────────────────────────────────────────
      # - name: Download legislation artifacts (optional)
      #   uses: actions/download-artifact@v4
      #   with:
      #     pattern: house-part*
      #     path: artifacts/
      #     merge-multiple: true

      # - name: Move legislation parts to public/
      #   run: |
      #     mkdir -p public/
      #     find artifacts/ -type f -name "*.json" -exec mv {} public/ \;
      #     ls -la public/ || true

      # - name: Merge legislation parts (optional)
      #   run: node scripts/merge-legislation-parts.js

      # ────────────────────────────────────────────────────────────────
      # Core fast steps — these usually take <45 min total
      # ────────────────────────────────────────────────────────────────

      - name: Attach committees
        run: node scripts/committee-reps-scraper.js

      - name: Attach votes
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: node scripts/votes-reps-scraper.js

      - name: Merge representatives data
        run: node scripts/merge-representatives.js

      - name: Attach misconduct (House)
        run: node scripts/misconduct-scraper.js house

      - name: Compute scores
        run: node scripts/representatives-scores.js

      - name: Update streaks
        run: node scripts/update-streaks.js

      # ────────────────────────────────────────────────────────────────
      # Commit any changes made during this fast run
      # ────────────────────────────────────────────────────────────────
      - name: Commit updated House files (fast debug run)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Debug fast House update [skip ci]"
          file_pattern: |
            public/representatives-rankings.json
            public/representatives-votes.json
            public/representatives-committees.json
            public/representatives-scores.json
            public/representatives-streaks.json
            public/representatives-merged.json
            public/housereps.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          push_options: '--force-with-lease'
          skip_dirty_check: false
          branch: main
