name: Debug House - Fast (legislation refresh optional)

on:
  workflow_dispatch:
    inputs:
      refresh_legislation:
        description: 'Refresh legislation from congress.gov API? (adds ~2-3 hours)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  fast-house:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install jsdom --save
          npm install xmldom --save

      # ────────────────────────────────────────────────────────────────
      # Legislation refresh from API (only if toggle enabled)
      # ────────────────────────────────────────────────────────────────
      - name: Run legislation part 1 (if enabled)
        if: github.event.inputs.refresh_legislation == 'true'
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: |
          node scripts/bootstrap-representatives.js
          node scripts/legislation-representatives-scraper.js 1
          mv public/legislation-representatives.json public/legislation-representatives-part1.json

      - name: Run legislation part 2 (if enabled)
        if: github.event.inputs.refresh_legislation == 'true'
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: |
          node scripts/bootstrap-representatives.js
          node scripts/legislation-representatives-scraper.js 2
          mv public/legislation-representatives.json public/legislation-representatives-part2.json

      - name: Run legislation part 3 (if enabled)
        if: github.event.inputs.refresh_legislation == 'true'
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: |
          node scripts/bootstrap-representatives.js
          node scripts/legislation-representatives-scraper.js 3
          mv public/legislation-representatives.json public/legislation-representatives-part3.json

      - name: Run legislation part 4 (if enabled)
        if: github.event.inputs.refresh_legislation == 'true'
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: |
          node scripts/bootstrap-representatives.js
          node scripts/legislation-representatives-scraper.js 4
          mv public/legislation-representatives.json public/legislation-representatives-part4.json

      - name: Merge fresh legislation parts (if enabled)
        if: github.event.inputs.refresh_legislation == 'true'
        run: node scripts/merge-legislation-parts.js

      # ────────────────────────────────────────────────────────────────
      # Core fast steps (always run)
      # ────────────────────────────────────────────────────────────────

      # ❌ REMOVED committee-reps-scraper.js
      # merge-representatives.js now handles committees exclusively

      - name: Attach votes
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: node scripts/votes-reps-scraper.js

      - name: Merge all data into rankings.json
        run: node scripts/merge-representatives.js

      - name: Attach misconduct (House)
        run: node scripts/misconduct-scraper.js house

      - name: Compute scores
        run: node scripts/representatives-scores.js

      - name: Update streaks
        run: node scripts/update-streaks.js

      # ────────────────────────────────────────────────────────────────
      # Commit changes
      # ────────────────────────────────────────────────────────────────
      - name: Commit updated House files (fast debug)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Fast debug update - legislation ${{ github.event.inputs.refresh_legislation == 'true' && 'refreshed from API' || 'skipped' }} [skip ci]"
          file_pattern: |
            public/representatives-rankings.json
            public/representatives-votes.json
            public/representatives-committees.json
            public/representatives-scores.json
            public/representatives-streaks.json
            public/representatives-legislation.json
            public/legislation-representatives-part*.json
            public/housereps.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          push_options: '--force-with-lease'
          branch: main
