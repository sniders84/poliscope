name: Debug House - Fast (legislation merge always attempted)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fast-house:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install jsdom --save
          npm install xmldom --save

      # ────────────────────────────────────────────────────────────────
      # Attempt to merge existing legislation parts (fast, ~5-10s)
      # If parts are missing/old, log warning but continue
      # ────────────────────────────────────────────────────────────────
      - name: Merge latest available legislation parts
        run: |
          if ls public/legislation-representatives-part*.json 1> /dev/null 2>&1; then
            echo "Found legislation part files - merging..."
            node scripts/merge-legislation-parts.js || echo "Merge failed - using existing merged data if available"
          else
            echo "No legislation part files found in public/ - skipping merge (using stale data if present)"
          fi

      # ────────────────────────────────────────────────────────────────
      # Core fast steps (always run)
      # ────────────────────────────────────────────────────────────────
      - name: Attach committees
        run: node scripts/committee-reps-scraper.js

      - name: Attach votes
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: node scripts/votes-reps-scraper.js

      - name: Merge all data into rankings.json
        run: node scripts/merge-representatives.js

      - name: Attach misconduct (House)
        run: node scripts/misconduct-scraper.js house

      - name: Compute scores
        run: node scripts/representatives-scores.js

      - name: Update streaks
        run: node scripts/update-streaks.js

      # ────────────────────────────────────────────────────────────────
      # Commit changes
      # ────────────────────────────────────────────────────────────────
      - name: Commit updated House files (fast debug)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Fast debug update [skip ci]"
          file_pattern: |
            public/representatives-rankings.json
            public/representatives-votes.json
            public/representatives-committees.json
            public/representatives-scores.json
            public/representatives-streaks.json
            public/representatives-legislation.json
            public/housereps.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          push_options: '--force-with-lease'
          branch: main
