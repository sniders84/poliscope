name: Debug House - Fast (legislation optional)

on:
  workflow_dispatch:
    inputs:
      refresh_legislation:
        description: 'Refresh legislation data? (adds ~2-3 hours - use only when needed)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  fast-house:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install jsdom --save
          npm install xmldom --save

      # ────────────────────────────────────────────────────────────────
      # Legislation refresh (only if toggle is enabled)
      # ────────────────────────────────────────────────────────────────
      - name: Download latest legislation parts (if enabled)
        if: github.event.inputs.refresh_legislation == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: house-part*
          path: artifacts/
          merge-multiple: true

      - name: Move legislation parts to public/ (if enabled)
        if: github.event.inputs.refresh_legislation == 'true'
        run: |
          mkdir -p public/
          find artifacts/ -type f -name "*.json" -exec mv {} public/ \;
          ls -la public/ || true

      - name: Merge fresh legislation parts (if enabled)
        if: github.event.inputs.refresh_legislation == 'true'
        run: node scripts/merge-legislation-parts.js

      # ────────────────────────────────────────────────────────────────
      # Core fast steps (always run) - ~30-60s total
      # ────────────────────────────────────────────────────────────────
      - name: Attach committees
        run: node scripts/committee-reps-scraper.js

      - name: Attach votes
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: node scripts/votes-reps-scraper.js

      - name: Merge all data into rankings.json
        run: node scripts/merge-representatives.js

      - name: Attach misconduct (House)
        run: node scripts/misconduct-scraper.js house

      - name: Compute scores
        run: node scripts/representatives-scores.js

      - name: Update streaks
        run: node scripts/update-streaks.js

      # ────────────────────────────────────────────────────────────────
      # Commit changes (only if files actually changed)
      # ────────────────────────────────────────────────────────────────
      - name: Commit updated House files (fast debug)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Fast debug update - legislation ${{ github.event.inputs.refresh_legislation == 'true' && 'refreshed' || 'skipped' }} [skip ci]"
          file_pattern: |
            public/representatives-rankings.json
            public/representatives-votes.json
            public/representatives-committees.json
            public/representatives-scores.json
            public/representatives-streaks.json
            public/representatives-legislation.json  # Include this so refreshed version is committed
            public/housereps.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          push_options: '--force-with-lease'
          branch: main
