name: Update Senate Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # nightly at 12 AM UTC (midnight)

permissions:
  contents: write

jobs:
  update-senate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Bootstrap senators
        run: node scripts/bootstrap-senators.js

      - name: Scrape legislation (119th Congress)
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: node scripts/legislation-scraper.js

      - name: Scrape votes
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: node scripts/votes-scraper.js

      # ❌ REMOVED — streak snapshot
      # - name: Snapshot previous Senate rankings
      #   run: cp public/senators-rankings.json public/senators-rankings-prev.json || true

      - name: Merge senator data
        run: node scripts/merge-senators.js

      - name: Scrape misconduct (Senate)
        run: node scripts/misconduct-scraper.js senate

      - name: Generate scores
        run: node scripts/senators-scores.js

      # ❌ REMOVED — streak updater
      # - name: Update streaks (Senate + House)
      #   run: node scripts/update-streaks-senators.js

      - name: Debug — list generated files
        if: always()
        run: |
          echo "Listing public/ contents after processing:"
          ls -la public/ | grep -E 'senators|legislation|committees|scores|misconduct' || echo "No matching files found"

      - name: Commit and push updated Senate files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Senate update (119th Congress) [skip ci]"
          file_pattern: |
            public/senators*.json
            public/senators-*.json
            public/legislation*.json
            public/committee*.json
            public/*scores.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          push_options: '--force-with-lease'
          skip_dirty_check: false
          skip_fetch: false
          branch: main
