name: Rebuild Senate Streak History (One-Time)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-senate-streaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Senate streak reconstruction
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: node scripts/rebuild-streak-history.js

      - name: Commit rebuilt Senate streak files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Rebuilt Senate streak history (119th Congress) [skip ci]"
          file_pattern: |
            public/senators-rankings.json
            public/senators-streaks.json
            public/senators-rankings-prev.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          push_options: '--force-with-lease'
          branch: main
